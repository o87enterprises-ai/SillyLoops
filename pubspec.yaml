name: sillyloops
description: A retro ARP sampler with hip-hop drum machine capabilities.
publish_to: 'none'
version: 1.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  file_picker: ^6.1.1
  path_provider: ^2.1.1
  audioplayers: ^5.2.1
  provider: ^6.1.1
  just_audio: ^0.9.36
  record: ^5.0.4
  shared_preferences: ^2.2.2
  flutter_midi_command: ^0.4.0
  permission_handler: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/samples/
